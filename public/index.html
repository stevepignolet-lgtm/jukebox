<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Jukebox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
    h1 { text-align: center; color: #1DB954; margin-bottom: 20px; }

    /* Lecteur en cours */
    #player { background: #282828; border-radius: 12px; padding: 14px; margin-bottom: 20px; cursor: pointer; transition: background 0.2s; }
    #player:hover { background: #333; }
    .player-inner { display: flex; align-items: center; gap: 12px; }
    #player img { width: 56px; height: 56px; border-radius: 6px; }
    .player-info { flex: 1; }
    .player-name { font-weight: bold; font-size: 15px; }
    .player-artist { color: #aaa; font-size: 13px; margin-bottom: 8px; }
    .progress-bar { background: #555; border-radius: 4px; height: 4px; width: 100%; }
    .progress-fill { background: #1DB954; height: 4px; border-radius: 4px; transition: width 0.5s; }
    .player-times { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-top: 4px; }
    #next-up { font-size: 12px; color: #aaa; margin-top: 10px; padding-top: 10px; border-top: 1px solid #444; }

    /* Panneau file d'attente */
    #queue-panel { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #121212; z-index: 100; overflow-y: auto; padding: 20px; }
    #queue-panel h2 { color: #1DB954; margin-bottom: 16px; }
    .close-btn { float: right; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
    .queue-track { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #282828; }
    .queue-track img { width: 40px; height: 40px; border-radius: 4px; }
    .queue-num { color: #aaa; font-size: 13px; width: 20px; text-align: center; }

    /* Recherche */
    .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 16px; background: #282828; color: white; }
    button { padding: 12px 20px; background: #1DB954; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1aa34a; }
    .track { display: flex; align-items: center; gap: 12px; background: #282828; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
    .track img { width: 56px; height: 56px; border-radius: 6px; }
    .track-info { flex: 1; }
    .track-name { font-weight: bold; font-size: 15px; }
    .track-artist { color: #aaa; font-size: 13px; }
    .add-btn { padding: 8px 14px; background: #1DB954; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .add-btn:disabled { background: #555; cursor: default; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1DB954; color: white; padding: 12px 24px; border-radius: 8px; display: none; font-size: 15px; z-index: 200; }
  </style>
</head>
<body>
  <h1>🎵 Jukebox</h1>

  <!-- Lecteur -->
  <div id="player" onclick="openQueue()">
    <div class="player-inner">
      <img id="p-img" src="" alt="" style="display:none">
      <div class="player-info">
        <div class="player-name" id="p-name">Chargement...</div>
        <div class="player-artist" id="p-artist"></div>
        <div class="progress-bar"><div class="progress-fill" id="p-progress" style="width:0%"></div></div>
        <div class="player-times"><span id="p-elapsed">0:00</span><span id="p-duration">0:00</span></div>
      </div>
    </div>
    <div id="next-up"></div>
  </div>

  <!-- Panneau file d'attente -->
  <div id="queue-panel">
    <button class="close-btn" onclick="closeQueue()">✕</button>
    <h2>🎶 File d'attente</h2>
    <div id="queue-list"></div>
  </div>

  <!-- Recherche -->
  <div class="search-bar">
    <input type="text" id="query" placeholder="Rechercher une musique..." />
    <button onclick="search()">🔍</button>
  </div>
  <div id="results"></div>
  <div class="toast" id="toast">✅ Ajouté à la file !</div>

  <script>
    // Recherche dynamique
    let debounceTimer;
    document.getElementById('query').addEventListener('input', e => {
      clearTimeout(debounceTimer);
      const q = e.target.value;
      if (q.length < 2) return;
      debounceTimer = setTimeout(() => search(), 400);
    });

    function fmt(ms) {
      const s = Math.floor(ms / 1000);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    // Lecteur en cours
    let progressInterval;
    let currentProgress = 0;
    let currentDuration = 1;
    let isPlaying = false;

    async function updatePlayer() {
      try {
        const res = await fetch('/now-playing');
        const data = await res.json();
        if (!data) {
          document.getElementById('p-name').textContent = 'Rien en cours de lecture';
          document.getElementById('p-artist').textContent = '';
          document.getElementById('p-img').style.display = 'none';
          return;
        }
        document.getElementById('p-name').textContent = data.name;
        document.getElementById('p-artist').textContent = data.artist + ' — ' + data.album;
        document.getElementById('p-img').src = data.image;
        document.getElementById('p-img').style.display = 'block';
        document.getElementById('p-duration').textContent = fmt(data.duration);
        currentProgress = data.progress;
        currentDuration = data.duration;
        isPlaying = data.is_playing;
        updateProgressBar();
      } catch (e) {}
    }

    function updateProgressBar() {
      const pct = (currentProgress / currentDuration) * 100;
      document.getElementById('p-progress').style.width = pct + '%';
      document.getElementById('p-elapsed').textContent = fmt(currentProgress);
    }

    // Avance la barre localement chaque seconde
    setInterval(() => {
      if (isPlaying) {
        currentProgress = Math.min(currentProgress + 1000, currentDuration);
        updateProgressBar();
      }
    }, 1000);

    // Rafraîchit depuis Spotify toutes les 5s
    updatePlayer();
    setInterval(updatePlayer, 5000);

    // File d'attente
    async function openQueue() {
      const res = await fetch('/queue-list');
      const tracks = await res.json();
      const div = document.getElementById('queue-list');
      if (!tracks.length) {
        div.innerHTML = '<p style="color:#aaa">File d\'attente vide</p>';
      } else {
        div.innerHTML = tracks.map((t, i) => `
          <div class="queue-track">
            <span class="queue-num">${i + 1}</span>
            <img src="${t.image}" alt="">
            <div>
              <div style="font-weight:bold;font-size:14px">${t.name}</div>
              <div style="color:#aaa;font-size:12px">${t.artist}</div>
            </div>
          </div>
        `).join('');
      }
      document.getElementById('queue-panel').style.display = 'block';
    }

    function closeQueue() {
      document.getElementById('queue-panel').style.display = 'none';
    }

    // Recherche
    async function search() {
      const q = document.getElementById('query').value;
      if (!q) return;
      const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
      const tracks = await res.json();
      const div = document.getElementById('results');
      div.innerHTML = tracks.map(t => `
        <div class="track">
          <img src="${t.image}" alt="">
          <div class="track-info">
            <div class="track-name">${t.name}</div>
            <div class="track-artist">${t.artist} — ${t.album}</div>
          </div>
          <button class="add-btn" onclick="addToQueue('${t.uri}', this)">＋</button>
        </div>
      `).join('');
    }

    async function addToQueue(uri, btn) {
      btn.disabled = true;
      btn.textContent = '✓';
      await fetch('/queue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uri })
      });
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 2500);
    }
  </script>
</body>
</html>
